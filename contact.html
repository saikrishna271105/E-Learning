<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LearnTech</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 20px;
        }
        .contact-info {
            background: white;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            resize: vertical;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><h2>LearnTech</h2></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="register.html">Register / Login</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Contact Us</h2>
        <p>Have questions? We'd love to hear from you.</p>

        <div class="contact-layout">
            <div class="contact-info">
                <h3>Our Office</h3>
                <br>
                <p><strong>Address:</strong><br>123 Tech Avenue, Suite 400<br>Silicon Valley, CA 94025</p>
                <br>
                <p><strong>Email:</strong><br>support@learntech.com</p>
                <br>
                <p><strong>Phone:</strong><br>+1 (555) 123-4567</p>
            </div>

            <div class="contact-info">
                <h3>Send an Inquiry</h3>
                <br>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
