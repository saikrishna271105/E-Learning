<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LearnTech</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="logo"><h2>LearnTech</h2></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="register.html">Register / Login</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 50px;">
        <h2 style="text-align: center;">Welcome Back</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Please login to your account.</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Login</button>
            <p id="login-message" style="margin-top: 10px; text-align: center;"></p>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Don't have an account? <a href="register.html" style="color: #3498db; text-decoration: none; font-weight: 600;">Register here</a>.
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginMessage = document.getElementById('login-message');
            if (password.length > 0 && email.length > 0) {
                loginMessage.style.color = "green";
                loginMessage.textContent = "Login successful! Redirecting to dashboard...";
            } else {
                loginMessage.style.color = "red";
                loginMessage.textContent = "Please enter both email and password.";
            }
        });
    </script>
</body>
</html>
